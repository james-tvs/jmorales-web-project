name: Deploy Final Subfolder to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Deploy Subfolder to gh-pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: final 
          branch: gh-pages 
